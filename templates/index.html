{% load static %}
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的云端相册-首页</title>
    <link type="text/css" rel="stylesheet" href="/static/css/footer.css">
    <link type="text/css" rel="stylesheet" href="/static/css/index.css">
    <link href="/static/lib/font-awesome/css/all.min.css" rel="stylesheet">
    <script type="text/javascript" src="/static/js/jquery-3.6.0.js"></script>
    <style>
        /* --- 自定义确认框 --- */
        .confirm-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .confirm-dialog {
            background: rgba(30,30,50,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.2rem; padding: 2rem;
            max-width: 380px; width: 90%; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: scaleIn 0.25s ease;
        }
        .confirm-dialog i { font-size: 2.5rem; margin-bottom: 1rem; }
        .confirm-dialog .icon-warn {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .confirm-dialog h4 { color: #fff; font-size: 1.15rem; margin-bottom: 0.5rem; }
        .confirm-dialog p { color: #999; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .confirm-dialog .btn-row { display: flex; gap: 0.8rem; justify-content: center; }
        .confirm-dialog .btn-cancel {
            background: rgba(255,255,255,0.1); color: #ccc;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 2rem;
            padding: 0.5rem 1.5rem; cursor: pointer; transition: all 0.2s;
        }
        .confirm-dialog .btn-cancel:hover { background: rgba(255,255,255,0.2); }
        .confirm-dialog .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff; border: none; border-radius: 2rem;
            padding: 0.5rem 1.5rem; cursor: pointer; transition: all 0.2s;
        }
        .confirm-dialog .btn-danger:hover { opacity: 0.85; transform: scale(1.03); }
        @keyframes scaleIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
<form action="{% url 'upload_file' %}" method="post" enctype="multipart/form-data" id="form">
    {% csrf_token %}
    <label for="file">点击上传：</label>
    <input type="file" id="file" name="file" multiple>
    <input type="button" value="提交" onclick="Toupload()">
</form>
<div>
    <ul>
        {% if data %}
            {% for file in data %}
                <li>
                <span title="点击查看大图" ondblclick="Delete({{ file.id }})" onclick="Pic('{{ file.url }}')">
                    <img src="{{ file.url }}" alt="" style="width: 200px;height: 200px;">
                </span>
                    <span title="{{ file.name }}">{{ file.name }}</span>
                </li>
            {% endfor %}
        {% else %}
            <li>暂未上传~~~~</li>
        {% endif %}
    </ul>
</div>
<footer class="footer-div">
    <div class="footer-inner-div">
        <span class="icp-span">
            <a target="_blank" href="https://beian.miit.gov.cn/#/Integrated/index" class="icp-a">
                京ICP备2022017561号-1
            </a>
        </span>
        <a target="_blank" href="http://www.beian.gov.cn/portal/registerSystemInfo?recordcode=11010602104280"
           class="police-a">
            <img src="/static/image/beian.png" alt="" class="police-img">
            <p class="police-p">京公网安备 11010602104280号</p>
        </a>
    </div>
</footer>

<!-- 自定义确认框 -->
<div id="confirmModal" class="confirm-overlay" style="display:none;">
    <div class="confirm-dialog">
        <i class="fas fa-triangle-exclamation icon-warn"></i>
        <h4 id="confirmTitle"></h4>
        <p id="confirmDesc"></p>
        <div class="btn-row">
            <button class="btn-cancel" onclick="closeConfirm()">取消</button>
            <button class="btn-danger" id="confirmOkBtn">确认删除</button>
        </div>
    </div>
</div>

<script type="text/javascript">
    function Toupload() {
        var file_dom = document.getElementById("file");
        if (file_dom.value == '') {
            alert("未上传图片！");
            return
        }
        var form_data = new FormData(document.getElementById("form"));
        if (['jpg', 'jpeg', 'png', 'mp4'].indexOf(file_dom.value.split('.')[file_dom.value.split('.').length - 1]) !== -1) {
            $.ajax({
                url: "{% url 'upload_file' %}",
                method: "post",
                data: form_data,
                processData: false,
                contentType: false,
                success: function (data) {
                    alert(data.message);
                    location.reload();
                },
                error: function (err) {
                    console.log(err);
                }
            })
        } else {
            alert("图片格式错误，请重新上传");
            document.getElementById("file").value = '';
        }
    }

    function Delete(file_id) {
        customConfirm('确认删除吗？', '删除后将移入回收站，30天内可恢复', function() {
            $.ajax({
                url: "{% url 'delete_file' %}",
                type: "post",
                data: {
                    _method: "DELETE",
                    csrfmiddlewaretoken: document.getElementsByTagName("input").namedItem("csrfmiddlewaretoken").value,
                    id: file_id,
                },
                success: function (data) {
                    alert(data.message);
                    location.reload();
                },
                error: function (err) {
                    console.log(err);
                }
            });
        });
    }

    function Pic(file_url) {
        window.open(file_url);
    }

    var _confirmCallback = null;
    function customConfirm(title, desc, callback) {
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmDesc').textContent = desc || '';
        document.getElementById('confirmModal').style.display = 'flex';
        _confirmCallback = callback;
    }
    function closeConfirm() {
        document.getElementById('confirmModal').style.display = 'none';
        _confirmCallback = null;
    }
    document.getElementById('confirmOkBtn').addEventListener('click', function() {
        document.getElementById('confirmModal').style.display = 'none';
        if (_confirmCallback) {
            var cb = _confirmCallback;
            _confirmCallback = null;
            cb();
        }
    });
</script>
</body>
</html>
